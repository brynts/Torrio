server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.php;

    # Handle manifest.json via PHP
    location ~* /([A-Za-z0-9_-]{10,})/manifest\.json$ {
        set $config_key $1;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/html/manifest.php;
        fastcgi_param CONFIG_KEY $config_key;
        add_header Content-Type application/json always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
        access_log off;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
