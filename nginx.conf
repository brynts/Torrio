server
{
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location ~* \.(css|js|png|jpg|gif|ico|svg)$
	{
		try_files $uri =404;
		add_header Cache-Control "public, max-age=3600";
	}

	location /
	{
		try_files $uri $uri/ /index.html; # ← Ini yang handle manifest.json via JS
	}
}
