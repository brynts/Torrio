services:
  torrio:
    build: .
    container_name: torrio
    ports:
      - "6969:80"
    volumes:
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped

    # Optional but recommended
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3