services:
  torrio:
    build: .
    container_name: torrio
    ports:
      - "6969:80"
    restart: unless-stopped
    depends_on:
      - php
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  php:
    image: php:fpm-alpine
    volumes:
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped
